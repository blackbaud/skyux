<div
  class="sky-inline-delete sky-inline-delete-{{ type }}"
  role="alertdialog"
  skyAnimationEndHandler
  animate.enter="sky-inline-delete-entering"
  animate.leave="sky-inline-delete-leaving"
  [animationTrigger]="enterAnimationTrigger()"
  emitOnAnimateEnter
  [attr.aria-describedby]="assistiveTextId"
  [attr.aria-label]="'skyux_inline_delete_confirm_deletion' | skyLibResources"
  (animationEnd)="onAnimationEnd()"
>
  <span
    class="sky-inline-delete-assistive-text sky-screen-reader-only"
    [id]="assistiveTextId"
  >
    {{ 'skyux_inline_delete_assistive_text' | skyLibResources }}
  </span>
  <sky-wait class="sky-inline-delete-wait" [isWaiting]="pending" />
  <div class="sky-inline-delete-content">
    <div class="sky-inline-delete-content-animation-container">
      <button
        #delete
        class="sky-btn sky-btn-danger sky-inline-delete-button"
        type="button"
        (click)="onDeleteClick()"
      >
        {{ 'skyux_inline_delete_delete' | skyLibResources }}
      </button>
      <button
        class="sky-btn sky-btn-default"
        type="button"
        (click)="onCancelClick()"
      >
        {{ 'skyux_inline_delete_cancel' | skyLibResources }}
      </button>
    </div>
  </div>
</div>
