@if (isAlive && useAsyncSearch) {
  <sky-input-box
    [disabled]="$safeNavigationMigration(skyComponentProperties?.disabled)"
    [formGroup]="editorForm"
  >
    <sky-lookup
      formControlName="selection"
      [ariaLabelledBy]="
        skyComponentProperties?.ariaLabelledBy ?? screenReaderLabel.id
      "
      [autocompleteAttribute]="
        $safeNavigationMigration(skyComponentProperties?.autocompleteAttribute)
      "
      [data]="$safeNavigationMigration(skyComponentProperties?.data)"
      [debounceTime]="
        $safeNavigationMigration(skyComponentProperties?.debounceTime)
      "
      [descriptorProperty]="
        $safeNavigationMigration(skyComponentProperties?.descriptorProperty)
      "
      [enableShowMore]="
        $safeNavigationMigration(skyComponentProperties?.enableShowMore)
      "
      [idProperty]="
        $safeNavigationMigration(skyComponentProperties?.idProperty)
      "
      [placeholderText]="
        $safeNavigationMigration(skyComponentProperties?.placeholderText)
      "
      [propertiesToSearch]="
        $safeNavigationMigration(skyComponentProperties?.propertiesToSearch)
      "
      [search]="$safeNavigationMigration(skyComponentProperties?.search)"
      [searchFilters]="
        $safeNavigationMigration(skyComponentProperties?.searchFilters)
      "
      [searchResultsLimit]="
        $safeNavigationMigration(skyComponentProperties?.searchResultsLimit)
      "
      [searchResultTemplate]="
        $safeNavigationMigration(skyComponentProperties?.searchResultTemplate)
      "
      [searchTextMinimumCharacters]="
        $safeNavigationMigration(
          skyComponentProperties?.searchTextMinimumCharacters
        )
      "
      [selectMode]="
        $safeNavigationMigration(skyComponentProperties?.selectMode)
      "
      [showAddButton]="
        $safeNavigationMigration(skyComponentProperties?.showAddButton)
      "
      [showMoreConfig]="
        $safeNavigationMigration(skyComponentProperties?.showMoreConfig)
      "
      [wrapperClass]="
        $safeNavigationMigration(skyComponentProperties?.wrapperClass)
      "
      (searchAsync)="skyComponentProperties?.searchAsync?.($event)"
      (addClick)="skyComponentProperties?.addClick?.($event)"
      (openChange)="onLookupOpenChange($event)"
      (selectionModalOpenChange)="onSelectionModalOpenChange($event)"
    />
  </sky-input-box>
}
