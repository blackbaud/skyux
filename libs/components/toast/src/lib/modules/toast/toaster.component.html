<div
  #toaster
  class="sky-toaster"
  [style.z-index]="zIndex$ | async"
  (focusin)="onFocusIn()"
  (focusout)="onFocusOut()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  @for (toast of toastsForDisplay; track toast.toastId) {
    <sky-toast
      animate.enter="sky-animation-emerge-enter"
      animate.leave="sky-animation-emerge-leave"
      [autoClose]="toast.config?.autoClose"
      [environmentInjector]="toastInjectors.get(toast.toastId)"
      [toastType]="toast.config?.type"
      (closed)="onToastClosed(toast)"
    >
      <ng-container
        [ngComponentOutlet]="toast.bodyComponent"
        [ngComponentOutletEnvironmentInjector]="
          toastInjectors.get(toast.toastId)
        "
      />
    </sky-toast>
  }
</div>
