<section
  class="sky-chart"
  [attr.aria-label]="headingText()"
  [attr.aria-labelledby]="headerId"
>
  <div class="sky-chart-header sky-margin-stacked-sm">
    <!-- Heading -->
    <div class="sky-chart-heading">
      @switch (headingLevel()) {
        @case (2) {
          <h2
            [id]="headerId"
            [class]="headingClass()"
            [class.sky-screen-reader-only]="headingHidden()"
          >
            {{ headingText() }}
          </h2>
        }
        @case (4) {
          <h4
            [id]="headerId"
            [class]="headingClass()"
            [class.sky-screen-reader-only]="headingHidden()"
          >
            {{ headingText() }}
          </h4>
        }
        @case (5) {
          <h5
            [id]="headerId"
            [class]="headingClass()"
            [class.sky-screen-reader-only]="headingHidden()"
          >
            {{ headingText() }}
          </h5>
        }
        @default {
          <h3
            [id]="headerId"
            [class]="headingClass()"
            [class.sky-screen-reader-only]="headingHidden()"
          >
            {{ headingText() }}
          </h3>
        }
      }
    </div>

    <!-- Subtitle -->
    @if (subtitleText()) {
      <div
        class="sky-chart-subtitle"
        [class.sky-screen-reader-only]="subtitleHidden()"
      >
        {{ subtitleText() }}
      </div>
    }
  </div>

  <!-- Chart -->
  <div class="sky-chart-content" [class.sky-margin-stacked-md]="showLegend()">
    <ng-content />
  </div>

  <!-- Legend -->
  @if (showLegend()) {
    <sky-chart-legend
      [legendItems]="legendItems()"
      (legendItemToggled)="onLegendItemToggled($event)"
    />
  }

  <!-- Actions -->
  <div class="sky-chart-actions">
    <sky-dropdown buttonType="context-menu">
      <sky-dropdown-menu>
        <sky-dropdown-item>
          <button type="button" (click)="openChartDataGridModal()">
            {{ 'chart.menu.view_data_table' | skyLibResources }}
          </button>
        </sky-dropdown-item>
      </sky-dropdown-menu>
    </sky-dropdown>
  </div>
</section>
