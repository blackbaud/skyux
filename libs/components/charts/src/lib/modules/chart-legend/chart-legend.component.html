@if (hasLegendItems()) {
  <span #buttonDescription="skyId" skyId class="sky-screen-reader-only">{{
    'chart.legend.legend_item.aria_description' | skyLibResources
  }}</span>

  <div
    class="sky-chart-legend"
    role="toolbar"
    tabindex="-1"
    [aria-label]="'chart.legend.aria_label' | skyLibResources"
    (focusin)="onLegendFocusIn($event)"
    (keydown)="onLegendKeydown($event)"
  >
    @for (
      item of legendItems();
      track item.labelText + '-' + item.datasetIndex + '-' + item.index
    ) {
      <button
        #legendButton
        class="sky-btn sky-chart-legend-button"
        type="button"
        role="switch"
        [attr.aria-checked]="item.isVisible"
        [attr.aria-describedby]="buttonDescription.id"
        [attr.aria-disabled]="isItemDisabled(item) ? 'true' : null"
        [attr.aria-label]="
          'chart.legend.legend_item.aria_label'
            | skyLibResources
              : item.labelText
              : $index + 1
              : legendItems().length
        "
        [attr.tabindex]="activeLegendIndex() === $index ? 0 : -1"
        (click)="toggleLegendItem(item, $index)"
        (focus)="onLegendButtonFocus($index)"
      >
        <span
          aria-hidden="true"
          class="sky-chart-legend-button-icon"
          [style.background]="item.seriesColor"
        ></span>

        <span
          class="sky-font-body-sm sky-chart-legend-button-label"
          [style.text-decoration]="item.isVisible ? '' : 'line-through'"
          >{{ item.labelText }}</span
        >
      </button>
    }
  </div>
}
