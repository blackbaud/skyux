<sky-dropdown
  buttonType="context-menu"
  [label]="'chart.controls.menu.label' | skyLibResources: headingText()"
>
  <sky-dropdown-menu>
    <sky-dropdown-item>
      <button
        type="button"
        [attr.aria-label]="
          'chart.controls.menu.view_data_table.aria_label'
            | skyLibResources: headingText()

        {{ 'chart.controls.menu.view_data_table' | skyLibResources }}
      </button>
    </sky-dropdown-item>
  </sky-dropdown-menu>
</sky-dropdown>
