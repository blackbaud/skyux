@switch (headingLevel()) {
  @case (2) {
    <h2 [id]="headingId()" [class]="headingClass()">
      {{ headingText() }}
    </h2>
  }
  @case (3) {
    <h3 [id]="headingId()" [class]="headingClass()">
      {{ headingText() }}
    </h3>
  }
  @case (4) {
    <h4 [id]="headingId()" [class]="headingClass()">
      {{ headingText() }}
    </h4>
  }
  @case (5) {
    <h5 [id]="headingId()" [class]="headingClass()">
      {{ headingText() }}
    </h5>
  }
}
