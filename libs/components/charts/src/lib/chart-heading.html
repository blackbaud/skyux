@switch (headingLevel()) {
  @case (2) {
    <h2
      [id]="headingId()"
      [class]="headingClass()"
      [class.sky-screen-reader-only]="headingHidden()"
    >
      {{ headingText() }}
    </h2>
  }
  @case (3) {
    <h3
      [id]="headingId()"
      [class]="headingClass()"
      [class.sky-screen-reader-only]="headingHidden()"
    >
      {{ headingText() }}
    </h3>
  }
  @case (4) {
    <h4
      [id]="headingId()"
      [class]="headingClass()"
      [class.sky-screen-reader-only]="headingHidden()"
    >
      {{ headingText() }}
    </h4>
  }
  @case (5) {
    <h5
      [id]="headingId()"
      [class]="headingClass()"
      [class.sky-screen-reader-only]="headingHidden()"
    >
      {{ headingText() }}
    </h5>
  }
}
