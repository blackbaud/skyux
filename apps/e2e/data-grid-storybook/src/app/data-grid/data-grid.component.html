<div class="sky-theme-padding-inset-balanced-l">
  <sky-data-grid [columnFit]="columnFit()" [data]="gridData">
    <sky-data-grid-column
      columnId="context"
      headingHidden
      headingText="Context menu"
      resizable="false"
      sortable="false"
      width="60"
      [template]="contextMenu"
    />
    <sky-data-grid-column
      field="name"
      headingText="Name"
      [flexWidth]="flexSizes().name"
      [width]="fixedSizes().name"
    />
    <sky-data-grid-column
      field="age"
      headingText="Age"
      dataType="number"
      [flexWidth]="flexSizes().age"
      [width]="fixedSizes().age"
    />
    <sky-data-grid-column
      field="startDate"
      headingText="Start date"
      dataType="date"
      [flexWidth]="flexSizes().startDate"
      [width]="fixedSizes().startDate"
    />
    <sky-data-grid-column
      field="endDate"
      headingText="End date"
      dataType="date"
      [flexWidth]="flexSizes().endDate"
      [width]="fixedSizes().endDate"
    />
    <sky-data-grid-column
      field="department"
      headingText="Department"
      [flexWidth]="flexSizes().department"
    >
      <ng-template let-row="row">{{ row.department?.name }}</ng-template>
    </sky-data-grid-column>
    <sky-data-grid-column
      field="jobTitle"
      headingText="Title"
      [flexWidth]="flexSizes().jobTitle"
    >
      <ng-template let-row="row">{{ row.jobTitle?.name }}</ng-template>
    </sky-data-grid-column>
  </sky-data-grid>
</div>

<ng-template #contextMenu let-row="row">
  <sky-dropdown
    buttonType="context-menu"
    [label]="`Context menu for ${row?.name}`"
  >
    <sky-dropdown-menu>
      <sky-dropdown-item>
        <button
          type="button"
          [attr.aria-label]="`Delete ${row?.name}`"
          (click)="actionClicked(row, 'Delete')"
        >
          Delete
        </button>
      </sky-dropdown-item>
      <sky-dropdown-item>
        <button
          type="button"
          [attr.aria-label]="`Mark ${row?.name} inactive`"
          (click)="actionClicked(row, 'Mark inactive')"
        >
          Mark inactive
        </button>
      </sky-dropdown-item>
      <sky-dropdown-item>
        <button
          type="button"
          [attr.aria-label]="`More info for ${row?.name}`"
          (click)="actionClicked(row, 'More info')"
        >
          More info
        </button>
      </sky-dropdown-item>
    </sky-dropdown-menu>
  </sky-dropdown>
</ng-template>
