<div style="max-width: 600px; padding: 20px">
  <sky-inline-form
    [config]="{ buttonLayout: buttonLayout }"
    [showForm]="showForm"
    [template]="formTemplate"
    (close)="onClose($event)"
  >
    <p>Read-only content. Click the button below to edit.</p>
    <button class="sky-btn sky-btn-default" type="button" (click)="openForm()">
      Edit
    </button>
  </sky-inline-form>

  <ng-template #formTemplate>
    <div class="sky-form-group">
      <label class="sky-control-label" for="inline-form-name">Name</label>
      <input
        class="sky-form-control"
        id="inline-form-name"
        type="text"
        placeholder="Enter a name"
      />
    </div>
  </ng-template>

  @if (lastCloseReason) {
    <p>Last closed with reason: <strong>{{ lastCloseReason }}</strong></p>
  }
</div>
