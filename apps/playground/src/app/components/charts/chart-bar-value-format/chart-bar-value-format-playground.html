<sky-chart headingText="Acquisitions by month">
  <sky-chart-bar>
    <sky-chart-axis-category
      labelHidden
      labelText="Month"
      [categories]="months"
    />
    <sky-chart-axis-value labelText="Acquisitions" />
    <sky-chart-series labelText="Acquisitions" [values]="acquisitions" />
  </sky-chart-bar>
</sky-chart>

<sky-chart headingText="Revenue by month">
  <sky-chart-bar>
    <sky-chart-axis-category
      labelHidden
      labelText="Month"
      [categories]="months"
    />
    <sky-chart-axis-value
      currencyCode="EUR"
      digits="0"
      format="currency"
      labelText="Revenue"
    />
    <sky-chart-series labelText="Revenue" [values]="revenue" />
  </sky-chart-bar>
</sky-chart>

<sky-chart headingText="Conversion rate by month">
  <sky-chart-bar>
    <sky-chart-axis-category labelText="Month" [categories]="months" />
    <sky-chart-axis-value format="percent" labelText="Conversion" />
    <sky-chart-series labelText="Conversion rate" [values]="conversionRate" />
  </sky-chart-bar>
</sky-chart>
