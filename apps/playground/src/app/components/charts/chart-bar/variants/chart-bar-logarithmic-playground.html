<sky-chart headingText="Monthly spendings">
  <sky-chart-bar [orientation]="orientation()">
    <sky-chart-axis-category labelText="Month" [categories]="categories" />
    <sky-chart-axis-measure labelText="Value" scaleType="logarithmic" />
    <sky-chart-bar-series labelText="Spending" [values]="values" />
  </sky-chart-bar>
</sky-chart>
