<sky-page layout="blocks">
  <sky-page-content>
    <sky-fluid-grid gutterSize="medium" [disableMargin]="true">
      <sky-row>
        <sky-column [screenSmall]="4">
          <sky-box class="sky-margin-stacked-xl" headingText="Basic">
            <sky-box-content>
              <app-chart-bar-basic />
            </sky-box-content>
          </sky-box>
        </sky-column>
        <sky-column [screenSmall]="4">
          <sky-box
            class="sky-margin-stacked-xl"
            headingText="Multiple series (grouped bars)"
          >
            <sky-box-content>
              <app-chart-bar-multiple-series />
            </sky-box-content>
          </sky-box>
        </sky-column>

        <sky-column [screenSmall]="4">
          <sky-box class="sky-margin-stacked-xl" headingText="Stacked series">
            <sky-box-content>
              <app-chart-bar-stacked />
            </sky-box-content>
          </sky-box>
        </sky-column>
      </sky-row>

      <sky-row>
        <sky-column [screenSmall]="4">
          <sky-box class="sky-margin-stacked-xl" headingText="Dual value axes">
            <sky-box-content>
              <app-chart-bar-dual-axis />
            </sky-box-content>
          </sky-box>
        </sky-column>

        <sky-column [screenSmall]="4">
          <sky-box
            class="sky-margin-stacked-xl"
            headingText="Horizontal orientation"
          >
            <sky-box-content>
              <app-chart-bar-horizontal />
            </sky-box-content>
          </sky-box>
        </sky-column>
        <sky-column [screenSmall]="4">
          <sky-box
            class="sky-margin-stacked-xl"
            headingText="Hidden axis labels"
          >
            <sky-box-content>
              <app-chart-bar-hidden-labels />
            </sky-box-content>
          </sky-box>
        </sky-column>
      </sky-row>

      <sky-row>
        <sky-column [screenSmall]="4">
          <sky-box headingText="Value formats">
            <sky-box-content>
              <app-chart-bar-value-format />
            </sky-box-content>
          </sky-box>
        </sky-column>
      </sky-row>
    </sky-fluid-grid>
  </sky-page-content>
</sky-page>
