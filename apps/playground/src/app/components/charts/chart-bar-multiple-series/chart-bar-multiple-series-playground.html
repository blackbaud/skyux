<sky-page layout="blocks">
  <sky-page-content>
    <h2>Multiple series (grouped bars)</h2>
    <sky-box headingText="Campaign performance">
      <sky-box-content>
        <sky-chart headingText="Actual vs. target">
          <sky-chart-bar>
            <sky-chart-category-axis labelText="Year" [categories]="years" />
            <sky-chart-value-axis labelText="Acquisitions" />
            <sky-chart-series labelText="Actual" [values]="actual" />
            <sky-chart-series labelText="Target" [values]="target" />
          </sky-chart-bar>
        </sky-chart>
      </sky-box-content>
    </sky-box>
  </sky-page-content>
</sky-page>
