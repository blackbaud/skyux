<h2>Charts Playground</h2>

<!-- Declarative -->
<div>
  <h2>Declarative</h2>
  <div>
    <sky-fluid-grid>
      <sky-row>
        <sky-column
          [screenXSmall]="12"
          [screenSmall]="12"
          [screenMedium]="6"
          [screenLarge]="6"
        >
          <sky-box headingText="Single series" class="sky-margin-stacked-xl">
            <sky-box-content>
              <sky-chart
                [headingText]="'Project Budget vs Actuals'"
                [headingHidden]="false"
                [headingLevel]="3"
                [headingStyle]="3"
                [subtitleText]="'Spending over a month'"
                [subtitleHidden]="false"
              >
                <sky-donut-chart-declarative
                  (dataPointClicked)="onDataPointClicked($event)"
                >
                  <sky-donut-chart-series labelText="Budget">
                    <sky-donut-chart-series-datapoint
                      category="Securities - WP"
                      labelText="$5,000,000"
                      [value]="5000000"
                    />

                    <sky-donut-chart-series-datapoint
                      category="Income/Compensation - WP"
                      labelText="$2,500,000"
                      [value]="2500000"
                    />

                    <sky-donut-chart-series-datapoint
                      category="Private Co. Valuation - WP"
                      labelText="$1,500,000"
                      [value]="1500000"
                    />

                    <sky-donut-chart-series-datapoint
                      category="Real Estate - WP"
                      labelText="$1,000,000"
                      [value]="1000000"
                    />
                  </sky-donut-chart-series>
                </sky-donut-chart-declarative>
              </sky-chart>
            </sky-box-content>
          </sky-box>
        </sky-column>
      </sky-row>
    </sky-fluid-grid>
  </div>
</div>

<!-- Imperative -->
<sky-fluid-grid>
  <sky-row>
    <sky-column
      [screenXSmall]="12"
      [screenSmall]="12"
      [screenMedium]="6"
      [screenLarge]="4"
    >
      <sky-box headingText="Chart 1">
        <sky-box-content>
          <sky-donut-chart
            [headingText]="'Project Budget vs Actuals'"
            [headingHidden]="false"
            [headingLevel]="3"
            [headingStyle]="3"
            [subtitleText]="'Spending over a month'"
            [subtitleHidden]="false"
            [config]="chart1"
            (dataPointClicked)="onDataPointClicked($event)"
          />
        </sky-box-content>
      </sky-box>
    </sky-column>

    <sky-column
      [screenXSmall]="12"
      [screenSmall]="12"
      [screenMedium]="6"
      [screenLarge]="4"
    >
      <sky-box headingText="Chart 2">
        <sky-box-content>
          <sky-donut-chart
            headingText="Monthly spendings"
            [config]="chart2"
            (dataPointClicked)="onDataPointClicked($event)"
          />
        </sky-box-content>
      </sky-box>
    </sky-column>

    <sky-column
      [screenXSmall]="12"
      [screenSmall]="12"
      [screenMedium]="6"
      [screenLarge]="4"
    >
      <sky-box headingText="Chart 3">
        <sky-box-content>
          <sky-donut-chart
            headingText="Monthly spendings"
            [config]="chart3"
            (dataPointClicked)="onDataPointClicked($event)"
          />
        </sky-box-content>
      </sky-box>
    </sky-column>
  </sky-row>
</sky-fluid-grid>
