<div id="screenshot-toast">
  <button
    class="sky-btn sky-btn-primary sky-theme-margin-right-s"
    type="button"
    (click)="openToasts()"
  >
    Open toasts
  </button>
  <button
    class="sky-btn sky-btn-default sky-theme-margin-right-s"
    type="button"
    (click)="openComponents()"
  >
    Open custom toasts
  </button>
  <button class="sky-btn sky-btn-default" type="button" (click)="closeAll()">
    Close all
  </button>
</div>
