<sky-modal headingText="Test" headingHidden>
  <sky-modal-banner>
    <div class="banner-content">
      <h2 class="sky-font-heading-1">Banner content</h2>
    </div>
  </sky-modal-banner>
  <sky-modal-content>Content</sky-modal-content>
  <sky-modal-footer>
    <button
      class="sky-btn sky-btn-primary"
      type="button"
      (click)="closeClick()"
    >
      Close
    </button>
  </sky-modal-footer>
</sky-modal>
