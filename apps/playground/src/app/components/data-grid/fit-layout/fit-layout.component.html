<sky-page layout="fit">
  <sky-page-header pageTitle="Data grid fit layout">
    <sky-page-header-actions>
      <button
        class="sky-btn sky-btn-default"
        type="button"
        routerLink="/components/data-grid/fit-tabs"
      >
        Data grid fit layout with tabs
      </button>
    </sky-page-header-actions>
  </sky-page-header>

  <sky-page-content>
    <sky-data-grid layout="fit" [data]="data">
      @for (column of columns; track column.field) {
        <sky-data-grid-column
          [columnHidden]="column.columnHidden"
          [dataType]="column.dataType"
          [field]="column.field"
          [headingText]="column.headingText"
          [sortable]="column.sortable"
          [width]="column.width"
        />
      }
    </sky-data-grid>
  </sky-page-content>
</sky-page>
