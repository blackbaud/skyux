<sky-data-manager>
  <sky-data-manager-toolbar>
    <sky-data-manager-toolbar-primary-item>
      <form [formGroup]="gridSettings">
        <sky-checkbox
          formControlName="enableTopScroll"
          iconName="arrow-fit"
          title="Top scroll"
          labelText="Top scroll"
          labelHidden
        />
        <sky-checkbox
          formControlName="useColumnGroups"
          iconName="group"
          title="Use column groups"
          labelText="Use column groups"
          labelHidden
        />
        <sky-checkbox
          formControlName="wrapText"
          iconName="text-align-left"
          title="Wrap text"
          labelText="Wrap text"
          labelHidden
        />
        <sky-checkbox
          formControlName="autoHeightColumns"
          iconName="arrow-maximize"
          title="Autoheight columns"
          labelText="Autoheight columns"
          labelHidden
        />
        <sky-checkbox
          formControlName="compact"
          iconName="crop"
          title="Compact layout"
          labelText="Compact layout"
          labelHidden
        />
        <sky-checkbox
          formControlName="showDelete"
          iconName="delete"
          title="Delete button"
          labelText="Delete button"
          labelHidden
        />
        <sky-checkbox
          formControlName="showSelect"
          iconName="checkmark"
          title="Select checkboxes"
          labelText="Show select checkboxes"
          labelHidden
        />
        <sky-checkbox
          formControlName="domLayoutNormal"
          iconName="arrow-minimize"
          title="Use normal DOM layout"
          labelText="Use normal DOM layout"
          labelHidden
        />
      </form>
    </sky-data-manager-toolbar-primary-item>
    <sky-data-manager-toolbar-primary-item>
      <sky-dropdown buttonStyle="link">
        <sky-dropdown-button> Show dropdown </sky-dropdown-button>
        <sky-dropdown-menu>
          <sky-dropdown-item>
            <button type="button" click>Option 1</button>
          </sky-dropdown-item>
          <sky-dropdown-item>
            <button type="button">Option 2</button>
          </sky-dropdown-item>
        </sky-dropdown-menu>
      </sky-dropdown>
    </sky-data-manager-toolbar-primary-item>
  </sky-data-manager-toolbar>
  <sky-data-view skyAgGridDataManagerAdapter [viewId]="viewId">
    @if (isActive()) {
      <sky-ag-grid-wrapper
        skyAgGridRowDelete
        [compact]="gridSettingsValue().compact"
        [(rowDeleteIds)]="rowDeleteIds"
        (rowDeleteConfirm)="deleteConfirm($event)"
      >
        <ag-grid-angular [gridOptions]="gridOptions()" [rowData]="items" />
      </sky-ag-grid-wrapper>
    }
  </sky-data-view>
</sky-data-manager>
